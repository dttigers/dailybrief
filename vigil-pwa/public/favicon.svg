<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="18" fill="#2C2C2A"/>
  <!-- Diamond outline (rotated square) — Teal 400 -->
  <polygon
    points="50,8 92,50 50,92 8,50"
    fill="none"
    stroke="#1D9E75"
    stroke-width="4"
    stroke-linejoin="round"
  />
  <!-- V mark — white, rounded joins -->
  <polyline
    points="30,38 50,63 70,38"
    fill="none"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Dot at V apex — Teal 400 -->
  <circle cx="50" cy="65" r="4.5" fill="#1D9E75"/>
</svg>
